name: Generate Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: ['main']

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animations
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: scout6774-66667
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=%23A855F7&color_dots=%230d1117,%23A855F7,%238A2BE2,%234B0082,%23c9d1d9
            dist/github-contribution-grid-snake-dark.gif?palette=github-dark&color_snake=%23A855F7

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
